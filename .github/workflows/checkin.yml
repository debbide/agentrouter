name: 自动签到任务

on:
  workflow_dispatch: # 允许手动执行
  schedule:
    - cron: '30 0 * * *' # 每天 UTC 0:30 (北京时间 8:30)

jobs:
  run-daily-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 安装自动化底层框架
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase
          sbase install chromedriver

      - name: 4. 安装虚拟显示外壳 (防崩溃)
        run: sudo apt-get update && sudo apt-get install -y xvfb xdotool

      - name: 5. 按需下载并配置 Sing-Box 代理
        if: env.PROXY_STR != ''
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
        run: |
          echo "检测到代理配置，正在拉起 Sing-Box..."
          # 下载预编译的 Linux sing-box 核心
          curl -LO https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz
          tar -xzf sing-box-1.9.3-linux-amd64.tar.gz
          sudo cp sing-box-1.9.3-linux-amd64/sing-box /usr/local/bin/
          
          # 生成 config.json
          python convert_proxy.py
          
          # 后台静默挂起代理隧道
          nohup sing-box run -c config.json > singbox.log 2>&1 &
          
          # 等待隧道连通
          sleep 3
          
          # 验证代理端口是否启动 (为保护节点隐私，不打印具体 IP)
          curl -sS --socks5 127.0.0.1:8080 -o /dev/null -w "代理隧道建立成功！" https://api.ipify.org || echo "代理可能未就绪，继续执行"

      - name: 6. 执行签到脚本
        env:
          GH_COOKIE: ${{ secrets.GH_COOKIE }}
          PROXY_STR: ${{ secrets.PROXY_STR }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          AGENTROUTER_USE_UC: 1
          # 动态决定是否喂代理环境变量
        run: |
          if [ -n "$PROXY_STR" ]; then
            echo "启用 BROWSER_PROXY 走代理节点隧道 (使用更稳定的 HTTP 协议)"
            export BROWSER_PROXY="http://127.0.0.1:8080"
          else
            echo "未配置代理，使用原生 IP 直接访问"
          fi
          # xvfb-run 伪装屏幕环境运行
          xvfb-run --auto-servernum python main.py
